<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script:Console Usage</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1 class="text-2xl font-bold">My First JS</h1>
    <button id="runBtn" class="px-3 py-1 border rounded mt-2 md-2 bg-black text-white">
        Run
    </button>
    <pre id="out" class="">

    </pre>
    <script>
        const out=document.getElementById("out")
        // fuction that accepts variable number of arguments
        function print(...args){
            //Console
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
        function run(){
            print("hello from javascript");
        print("2+3",2+3);
        document.body.style.background="#FCFBBB";
        }
        document.getElementById("runBtn").addEventListener("click",run);
        run();
    </script>
</body>
</html>
