<!DOCTYPE html>
<html>
<head>
    <title>FAQ Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div>
    <h1>FAQ Builder</h1>
    <input id="question" type="text" placeholder="Enter Question"
    class="border w-full p-2 mb-3 rounded">

    <textarea id="answer" placeholder="Enter Answer"
    class="border w-full p-2 mb-3 rounded"></textarea>

    <button id="addBtn" type="button" class="border 20px rounded ml-5">Add FAQ</button>

    <p id="message" class="text-red-500 mt-2"></p>
</div>

<div id="Container">
    <p id="emptyMsg">No FAQs available</p>
</div>

<script src="A2.js"></script>

</body>
</html>
