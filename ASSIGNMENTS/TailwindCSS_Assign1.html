<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    
    <div class="bg-white-500 hover:bg-white-600 text-black px-6 py-3 rounded-lg shadow justify-between md-4">
        <h1 class="text-2xl font-bold">Notification Center</h1>
       <div class="flex items-center">
         <span class="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-1 rounded-full ml-220 mt-1">
            3 New</span>
       </div>
    </div>
    <div class="bg-red-100 text-black px-6 py-3 rounded-lg shadow">
        <h2 class="text-2xl font-bold text-red-600">Action required</h2>
       <div class="flex w-40">
            <p class="text-sm text-red-700">
                Your last payment attempt failed. Please update your payment method to avoid service interruption.</p>
       </div>
       
    </div>
    <br>
    <div class="bg-yellow-100 text-black px-6 py-3 rounded-lg shadow">
        <h2 class="text-2xl font-bold text-yellow-600">Maintenance Notice</h2>
       <div class="flex w-40">
            <p class="text-sm text-yellow-700 leading-relaxed">
                The system will undergo maintenance tonight. Some features may be temporarily unavailable.</p>
       </div>
    </div>
</body>
<footer>
    <div class="flex gap-3 mt-5">
        <button class="bg-blue-600 text-white px-5 py-2 rounded-sm text-sm hover:bg-blue-100 transition">View All</button>
        <button class="border border-gray-300 text-gray-700 px-5 py-2 rounded-md text-sm hover:bg-gray-100 transition">Dismiss</button>
    </footer>
</html>
